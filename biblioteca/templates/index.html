{% extends "base.html" %}
{% block title %} Inicio {% endblock %}

{% block content %}
    <div class="text-center mt-5">
        <h1>Bienvenido a la biblioteca</h1>
        <p class="text-muted mt-3">Consulta añade y gestiona tu colección</p>
        <a href="{{ url_for('books.list_books') }}" class="btn btn-primary btn-lg mt-3"> Ver catálogo</a>
        {% if not is_logged_in() %}
            <a href="{{ url_for('books.list_books') }}" class="btn btn-outline-secondary btn-lg mt3">Registrarse</a>
        {% endif %}
    </div>
{% endblock %}
