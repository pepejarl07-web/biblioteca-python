{% extends "base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <h2 class="mb-4">Crear cuenta</h2>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username"
                       class="form-control {% if errors.username %}is-invalid{% endif %}"
                       value="{{ data.username or '' }}" required>
                {% if errors.username %}
                <div class="invalid-feedback">{{ errors.username }}</div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña <small class="text-muted">(mínimo 6 caracteres)</small></label>
                <input type="password" name="password"
                       class="form-control {% if errors.password %}is-invalid{% endif %}" required>
                {% if errors.password %}
                <div class="invalid-feedback">{{ errors.password }}</div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label">Rol</label>
                <select name="role" class="form-select">
                    <option value="user">Usuario</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100">Registrarse</button>
        </form>

        <p class="mt-3 text-center">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
        </p>
    </div>
</div>
{% endblock %}
